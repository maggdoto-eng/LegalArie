name: legalaarie_app
description: "LegalArie - Legal Practice Management Mobile App"
publish_to: 'none'

version: 0.0.1+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Navigation
  get: ^4.6.5
  go_router: ^12.0.0
  
  # HTTP & Networking
  dio: ^5.3.3
  socket_io_client: ^2.0.1+1
  
  # State Management
  get_it: ^7.6.0
  
  # Firebase
  firebase_core: ^2.24.0
  firebase_messaging: ^14.7.0
  firebase_auth: ^4.14.0
  firebase_database: ^10.5.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  url_launcher: ^6.2.2
  
  # Image handling
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  
  # Video/Audio (for future document preview)
  video_player: ^2.8.1
  
  # JWT decoding
  dart_jsonwebtoken: ^2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^2.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
